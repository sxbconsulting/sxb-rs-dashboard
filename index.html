<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SIGNALBRIEF — SXB RS Dashboard '26</title>

<!-- Typographie -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- Supabase SDK (version épinglée stable) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>

<style>
/* =================================================================
   DA "STUDIO" — variables CSS. Aucune couleur en dur ailleurs.
   Mode sombre par défaut ; mode clair via [data-theme="light"].
   ================================================================= */
:root, [data-theme="dark"]{
  --bg:#0E0F11; --surface:#17191C; --surface-2:#1E2125; --border:#2A2D31;
  --text:#F2F0EC; --text-2:#9CA0A6; --text-3:#6B6F76;
  --accent:#D97757; --accent-hover:#C4622D; --accent-text:#0E0F11;
  --success:#4FB477; --warning:#E6B84F; --error:#E05C4F; --info:#5B9BD5;
  --shadow:none;
  --ig:#D97757; --li:#5B9BD5; --tt:#F2F0EC; --yt:#E05C4F;
  /* alias de compatibilité */
  --card:var(--surface); --muted:var(--text-2); --line:var(--border);
}
[data-theme="light"]{
  --bg:#FAFAF8; --surface:#FFFFFF; --surface-2:#F4F3F0; --border:#E6E4DF;
  --text:#15161A; --text-2:#5A5E66; --text-3:#8A8E96;
  --accent:#C4622D; --accent-hover:#A8501F; --accent-text:#FFFFFF;
  --success:#2E8B57; --warning:#B8860B; --error:#C0392B; --info:#2D6FB0;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --ig:#C4622D; --li:#2D6FB0; --tt:#15161A; --yt:#C0392B;
}
/* échelle typo & tokens */
:root{
  --font-sans:'Geist','Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'DM Mono',ui-monospace,monospace;
  --fs-xs:12px; --fs-sm:13px; --fs-base:16px; --fs-md:18px; --fs-lg:22px;
  --fs-xl:28px; --fs-2xl:36px; --fs-3xl:48px;
  --r-chip:6px; --r:8px; --r-card:12px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-6:24px;
  --sp-8:32px; --sp-12:48px; --sp-16:64px;
  --ease:cubic-bezier(0.16,1,0.3,1); --dur:200ms;
}

*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:var(--font-sans); font-size:var(--fs-base);
  line-height:1.5; -webkit-font-smoothing:antialiased;
  transition:background var(--dur) var(--ease), color var(--dur) var(--ease);
}
.mono{font-family:var(--font-mono); font-feature-settings:"tnum"}
h1,h2,h3,h4{font-weight:600; letter-spacing:-0.02em; line-height:1.2}
a{color:var(--accent); text-decoration:none}
button{font-family:inherit; cursor:pointer}
::selection{background:var(--accent); color:var(--accent-text)}

/* --- boutons --- */
.btn{display:inline-flex; align-items:center; gap:var(--sp-2);
  padding:9px 16px; border-radius:var(--r); border:.5px solid transparent;
  font-size:var(--fs-sm); font-weight:500; transition:all var(--dur) var(--ease)}
.btn-primary{background:var(--accent); color:var(--accent-text)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:transparent; color:var(--text); border-color:var(--border)}
.btn-secondary:hover{background:var(--surface-2)}
.btn-ghost{background:transparent; color:var(--text-2); border-color:transparent}
.btn-ghost:hover{color:var(--text); background:var(--surface-2)}
.btn-sm{padding:6px 12px; font-size:var(--fs-xs)}
.btn:disabled{opacity:.5; cursor:not-allowed}
.btn:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
  outline:none; box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}

/* --- cartes --- */
.card{background:var(--surface); border:.5px solid var(--border);
  border-radius:var(--r-card); padding:var(--sp-4) var(--sp-6); box-shadow:var(--shadow)}
.card+.card{margin-top:var(--sp-4)}

/* --- inputs --- */
input,textarea,select{
  width:100%; background:var(--surface-2); color:var(--text);
  border:.5px solid var(--border); border-radius:var(--r);
  padding:9px 12px; font-size:var(--fs-sm); font-family:inherit;
  transition:border var(--dur) var(--ease)}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical; min-height:90px; line-height:1.6}
label{display:block; font-size:var(--fs-xs); color:var(--text-3);
  margin-bottom:var(--sp-1); letter-spacing:.01em}
.field-filled{animation:flashGreen 3s var(--ease)}
@keyframes flashGreen{0%,40%{border-color:var(--success); box-shadow:0 0 0 1px var(--success)}100%{}}

/* --- chips / badges / tabs --- */
.chip{display:inline-flex; align-items:center; gap:6px; padding:5px 11px;
  border-radius:var(--r-chip); border:.5px solid var(--border);
  background:transparent; color:var(--text-2); font-size:var(--fs-xs); font-weight:500}
.chip.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
.badge{padding:3px 9px; border-radius:var(--r-chip); font-size:11px; font-weight:600}
.badge-free{background:var(--surface-2); color:var(--text-2)}
.badge-pro{background:var(--accent); color:var(--accent-text)}
.tabs{display:flex; gap:var(--sp-1); border-bottom:.5px solid var(--border);
  margin-bottom:var(--sp-6); overflow-x:auto}
.tab{padding:10px 14px; font-size:var(--fs-sm); color:var(--text-3);
  border-bottom:2px solid transparent; white-space:nowrap; background:none; font-weight:500}
.tab:hover{color:var(--text-2)}
.tab.active{color:var(--text); border-bottom-color:var(--accent)}

/* --- metrics / KPI --- */
.kpi-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:var(--sp-4)}
.kpi{background:var(--surface); border:.5px solid var(--border);
  border-radius:var(--r-card); padding:var(--sp-4); box-shadow:var(--shadow)}
.kpi .label{font-size:var(--fs-xs); color:var(--text-3); text-transform:uppercase;
  letter-spacing:.04em; margin-bottom:6px}
.kpi .value{font-family:var(--font-mono); font-size:var(--fs-lg); color:var(--text)}
.kpi .delta{font-size:var(--fs-xs); font-family:var(--font-mono); margin-top:4px}
.kpi.featured{border-color:var(--accent)}
.kpi.featured .value{color:var(--accent)}
.up{color:var(--success)} .down{color:var(--error)} .flat{color:var(--text-3)}

/* --- layout --- */
#app{display:none; min-height:100vh}
.sidebar{position:fixed; top:0; left:0; bottom:0; width:252px; background:var(--surface);
  border-right:.5px solid var(--border); padding:var(--sp-6) var(--sp-4);
  display:flex; flex-direction:column; gap:var(--sp-2); overflow-y:auto; z-index:40;
  transition:transform var(--dur) var(--ease)}
.brand{font-size:var(--fs-md); font-weight:600; letter-spacing:-0.02em; margin-bottom:var(--sp-1)}
.brand .sub{display:block; font-size:11px; color:var(--text-3); font-weight:400; letter-spacing:.06em}
.nav-group{margin-top:var(--sp-4)}
.nav-group .ttl{font-size:10px; text-transform:uppercase; letter-spacing:.1em;
  color:var(--text-3); padding:0 10px; margin-bottom:var(--sp-2)}
.nav-item{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--r);
  color:var(--text-2); font-size:var(--fs-sm); font-weight:500; transition:all var(--dur) var(--ease); cursor:pointer}
.nav-item:hover{background:var(--surface-2); color:var(--text)}
.nav-item.active{background:var(--surface-2); color:var(--accent)}
.main{margin-left:252px; min-height:100vh; display:flex; flex-direction:column}
.topbar{display:flex; align-items:center; justify-content:flex-end; gap:var(--sp-3);
  padding:var(--sp-3) var(--sp-6); border-bottom:.5px solid var(--border); background:var(--bg);
  position:sticky; top:0; z-index:30}
.topbar .email{font-size:var(--fs-xs); color:var(--text-2); max-width:200px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.content{padding:var(--sp-8) var(--sp-6); max-width:1180px; width:100%; flex:1}
.section{display:none}
.section.active{display:block}
.page-title{font-size:var(--fs-xl); margin-bottom:var(--sp-1)}
.page-sub{color:var(--text-2); font-size:var(--fs-sm); margin-bottom:var(--sp-8)}

/* --- saisie --- */
.fieldset{margin-bottom:var(--sp-8)}
.fieldset > legend, .fieldset .legend{font-size:var(--fs-xs); text-transform:uppercase;
  letter-spacing:.08em; color:var(--accent); margin-bottom:var(--sp-3); font-weight:600}
.field-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:var(--sp-4)}

/* --- tableaux --- */
.table-wrap{overflow-x:auto; border:.5px solid var(--border); border-radius:var(--r-card)}
table{width:100%; border-collapse:collapse; font-size:var(--fs-sm)}
th{text-align:left; padding:10px 14px; font-size:var(--fs-xs); color:var(--text-3);
  text-transform:uppercase; letter-spacing:.04em; border-bottom:.5px solid var(--border); white-space:nowrap}
td{padding:11px 14px; border-bottom:.5px solid var(--border); white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.me-row{background:var(--surface-2)}
tr.me-row td:first-child{box-shadow:inset 2px 0 0 var(--accent)}

/* --- veille / créateurs --- */
.grid-cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:var(--sp-4)}
.avatar{width:40px; height:40px; border-radius:50%; background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; font-weight:600; color:var(--accent); flex-shrink:0}
.pf-dot{width:8px; height:8px; border-radius:50%; display:inline-block}

/* --- IA boxes --- */
.ai-box{background:var(--surface-2); border:.5px solid var(--border); border-radius:var(--r);
  padding:var(--sp-4); white-space:pre-wrap; line-height:1.7; font-size:var(--fs-sm); min-height:60px}
.ai-box:empty::before{content:"L'analyse apparaîtra ici."; color:var(--text-3)}
.spinner{width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent);
  border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* --- screenshot import --- */
.thumbs{display:flex; gap:var(--sp-2); flex-wrap:wrap; margin-top:var(--sp-3)}
.thumbs img{width:54px; height:54px; object-fit:cover; border-radius:var(--r); border:.5px solid var(--border)}

/* --- bannière backup --- */
.banner{background:var(--surface-2); border:.5px solid var(--border); border-left:3px solid var(--warning);
  border-radius:var(--r); padding:10px var(--sp-4); font-size:var(--fs-xs); color:var(--text-2); margin-bottom:var(--sp-6)}

/* --- état vide --- */
.empty{text-align:center; padding:var(--sp-16) var(--sp-6); color:var(--text-3)}
.empty .ico{font-size:40px; margin-bottom:var(--sp-3); opacity:.6}

/* --- courbe de rétention (signature) --- */
.retention-sig{display:block; width:100%; max-width:520px; margin:var(--sp-4) 0}

/* --- modal --- */
.modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:90; display:none;
  align-items:center; justify-content:center; padding:var(--sp-4)}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface); border:.5px solid var(--border); border-radius:var(--r-card);
  padding:var(--sp-6); max-width:560px; width:100%; max-height:85vh; overflow-y:auto}

/* --- auth (contraste critique en sombre) --- */
#auth{position:fixed; inset:0; z-index:100; background:var(--bg);
  display:flex; align-items:center; justify-content:center; padding:var(--sp-4)}
.auth-box{background:var(--surface); border:.5px solid var(--border); border-radius:var(--r-card);
  padding:var(--sp-8); width:100%; max-width:400px; box-shadow:0 16px 48px rgba(0,0,0,.4)}
[data-theme="dark"] .auth-box{background:#1A1D21; border-color:#2F3338}
[data-theme="dark"] .auth-box input{background:#121417; border-color:#2F3338}
.auth-box .brand{text-align:center; margin-bottom:var(--sp-6)}
.auth-tabs{display:flex; gap:var(--sp-1); margin-bottom:var(--sp-6); background:var(--surface-2);
  border-radius:var(--r); padding:3px}
.auth-tabs button{flex:1; padding:8px; border:none; border-radius:6px; background:transparent;
  color:var(--text-2); font-size:var(--fs-sm); font-weight:500}
.auth-tabs button.active{background:var(--accent); color:var(--accent-text)}
.auth-field{margin-bottom:var(--sp-4)}
.auth-msg{margin-top:var(--sp-4); font-size:var(--fs-xs); min-height:18px; text-align:center}
.auth-msg.err{color:var(--error)} .auth-msg.ok{color:var(--success)}

/* --- mobile --- */
.hamburger,.sidebar-close,.bottom-nav{display:none}
.backdrop{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:35}
.backdrop.open{display:block}

@media(max-width:900px){
  .sidebar{width:220px}
  .main{margin-left:220px}
}
@media(max-width:680px){
  .sidebar{transform:translateX(-100%); width:260px; z-index:50}
  .sidebar.open{transform:translateX(0)}
  .sidebar-close{display:block; position:absolute; top:14px; right:14px}
  .main{margin-left:0}
  .hamburger{display:inline-flex}
  .content{padding:var(--sp-6) var(--sp-4); padding-bottom:88px}
  .field-grid{grid-template-columns:1fr !important}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .topbar{padding:var(--sp-3) var(--sp-4); justify-content:space-between}
  .topbar .email{max-width:120px}
  .bottom-nav{display:flex; position:fixed; bottom:0; left:0; right:0; z-index:60;
    background:var(--surface); border-top:.5px solid var(--border); padding:6px 0}
  .bottom-nav .bn{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:6px 0; background:none; border:none; color:var(--text-3); font-size:10px; font-weight:500}
  .bottom-nav .bn.active{color:var(--accent)}
  .bottom-nav .bn .ic{font-size:18px}
  .modal{align-self:flex-end; border-bottom-left-radius:0; border-bottom-right-radius:0;
    animation:slideUp .25s var(--ease)}
}
@keyframes slideUp{from{transform:translateY(40px); opacity:0}to{transform:translateY(0); opacity:1}}

/* --- animation d'entrée --- */
.fadeUp{animation:fadeUp .3s var(--ease) both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}
@keyframes fadeUp{from{opacity:0; transform:translateY(12px)}to{opacity:1; transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}
.row{display:flex; gap:var(--sp-3); align-items:center; flex-wrap:wrap}
.row.between{justify-content:space-between}
.mt4{margin-top:var(--sp-4)} .mt6{margin-top:var(--sp-6)} .mb4{margin-bottom:var(--sp-4)}
.muted{color:var(--text-2)} .small{font-size:var(--fs-xs)}
canvas{max-width:100%}
</style>
</head>

<!-- ============================= AUTH ============================= -->
<div id="auth">

</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="if(event.target===this)closeModal()">

const AI_SYSTEM = `Tu es l'IA intégrée à SIGNALBRIEF (SXB RS Dashboard '26).

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch{ return def; } }

let authMode = 'login';
function switchAuthTab(m){
  authMode = m;
  document.getElementById('tab-login').classList.toggle('active', m==='login');
  document.getElementById('tab-signup').classList.toggle('active', m==='signup');
  document.getElementById('auth-action').textContent = m==='login' ? 'Se connecter' : 'Créer mon compte';
  setAuthMsg('');
}
function setAuthMsg(t,ok){ const e=document.getElementById('auth-msg'); e.textContent=t; e.className='auth-msg '+(ok?'ok':(t?'err':'')); }

async function doAuth(){ authMode==='login' ? doLogin() : doSignup(); }

async function doLogin(){
  const email=val('auth-email'), pass=val('auth-pass');
  if(!email||!pass) return setAuthMsg("Renseigne email et mot de passe.");
  if(!supa) return setAuthMsg("Supabase non initialisé — vérifie tes clés.");
  setAuthMsg("Connexion…", true);
  try{
    const { data, error } = await supa.auth.signInWithPassword({ email, password:pass });
    if(error) return setAuthMsg(error.message);
    onAuthSuccess(data.user);
  }catch(e){ setAuthMsg("Erreur réseau : "+e.message); }
}
async function doSignup(){
  const email=val('auth-email'), pass=val('auth-pass');
  if(!email||pass.length<6) return setAuthMsg("Mot de passe : 6 caractères minimum.");
  if(!supa) return setAuthMsg("Supabase non initialisé — vérifie tes clés.");
  setAuthMsg("Création du compte…", true);
  try{
    const { data, error } = await supa.auth.signUp({ email, password:pass });
    if(error) return setAuthMsg(error.message);
    if(data.user && !data.session) return setAuthMsg("Compte créé. Vérifie tes emails pour confirmer, puis connecte-toi.", true);
    onAuthSuccess(data.user);
  }catch(e){ setAuthMsg("Erreur réseau : "+e.message); }
}
async function doLogout(){ try{ await supa.auth.signOut(); }catch{} location.reload(); }

async function onAuthSuccess(user){
  CURRENT_USER = user;
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-email').textContent = user.email || '';
  loadLocal();
  await syncFromSupabase();
  renderAll();
  showSection('dashboard');
}

async function initAuth(){
  restoreTheme();
  if(!supa){ setAuthMsg("Clés Supabase manquantes — renseigne SUPA_KEY dans le code."); return; }
  try{
    const { data } = await supa.auth.getSession();
    if(data.session && data.session.user){ onAuthSuccess(data.session.user); }
  }catch(e){ console.error(e); }
}

/* =================================================================
   5. SYNC SUPABASE  ⇄  LOCALSTORAGE (+ migration unique)
   ================================================================= */
async function syncFromSupabase(){
  if(!supa||!CURRENT_USER) return;
  try{
    const [we, wa, vn, cp] = await Promise.all([
      supa.from('weekly_entries').select('week_platform,entry_data'),
      supa.from('watch_accounts').select('id,account_data'),
      supa.from('veille_notes').select('notes').maybeSingle(),
      supa.from('competitors').select('id,comp_data')
    ]);
    const remoteEntries = {};
    (we.data||[]).forEach(r=> remoteEntries[r.week_platform]=r.entry_data);
    const remoteEmpty = !we.data || we.data.length===0;

    if(remoteEmpty && Object.keys(state.entries).length && !lsGet('sxb_migrated_v1',false)){
      // Migration unique du localStorage → Supabase
      await migrateLocalToSupabase();
      lsSet('sxb_migrated_v1', true);
    } else if(!remoteEmpty){
      state.entries = remoteEntries; lsSet(LS.entries, state.entries);
    }
    if(wa.data){ state.accounts = wa.data.map(r=>({id:r.id, ...r.account_data})); lsSet(LS.accounts, state.accounts); }
    if(vn.data){ state.notes = vn.data.notes||''; lsSet(LS.notes, state.notes); }
    if(cp.data){ state.comps = cp.data.map(r=>({id:r.id, ...r.comp_data})); lsSet(LS.comps, state.comps); }
  }catch(e){ console.error("Sync Supabase :", e); toast("⚠️ Sync impossible, mode local."); }
}
async function migrateLocalToSupabase(){
  if(!supa||!CURRENT_USER) return;
  const rows = Object.entries(state.entries).map(([wp,ed])=>({ user_id:CURRENT_USER.id, week_platform:wp, entry_data:ed }));
  if(rows.length){ try{ await supa.from('weekly_entries').upsert(rows,{onConflict:'user_id,week_platform'}); }catch(e){ console.error(e); } }
}
async function pushEntry(wp, data){
  if(!supa||!CURRENT_USER) return;
  try{ await supa.from('weekly_entries').upsert({ user_id:CURRENT_USER.id, week_platform:wp, entry_data:data, updated_at:new Date().toISOString() },{onConflict:'user_id,week_platform'}); }
  catch(e){ console.error(e); toast("⚠️ Sauvegarde cloud échouée (gardé en local)."); }
}
async function deleteEntry(wp){
  delete state.entries[wp]; lsSet(LS.entries, state.entries);
  if(supa&&CURRENT_USER){ try{ await supa.from('weekly_entries').delete().eq('user_id',CURRENT_USER.id).eq('week_platform',wp); }catch(e){ console.error(e); } }
}

function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function num(v){ const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?null:n; }
function fmt(n){ if(n==null||n==='') return '—'; const x=+n; return Math.abs(x)>=1000? x.toLocaleString('fr-FR') : (Number.isInteger(x)? x : x.toFixed(1)); }
function isoWeek(d){ d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=(d.getUTCDay()+6)%7; d.setUTCDate(d.getUTCDate()-day+3); const f=new Date(Date.UTC(d.getUTCFullYear(),0,4)); const w=1+Math.round(((d-f)/86400000-3+((f.getUTCDay()+6)%7))/7); return `${d.getUTCFullYear()}-W${String(w).padStart(2,'0')}`; }
function currentWeek(){ return isoWeek(new Date()); }
function allWeeks(){ const s=new Set(); Object.keys(state.entries).forEach(k=>s.add(k.split('_')[0])); return [...s].sort(); }
function entry(week,p){ return state.entries[`${week}_${p}`]||null; }
function platformWeeks(p){ return Object.keys(state.entries).filter(k=>k.endsWith('_'+p)).map(k=>k.split('_')[0]).sort(); }
function toast(msg){ const t=document.createElement('div'); t.textContent=msg;
  t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);border:.5px solid var(--border);padding:10px 18px;border-radius:8px;z-index:200;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.3)';
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600); }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- 8.1 DASHBOARD ---------- */
function renderDashboard(){
  const el=document.getElementById('sec-dashboard');
  const weeks=allWeeks();
  if(!weeks.length){
    el.innerHTML=`<h1 class="page-title">Vue globale</h1><p class="page-sub">Tes 4 réseaux en un coup d'œil.</p>
    <div class="empty"><div class="ico">📊</div><p>Aucune donnée pour l'instant.</p>
    <button class="btn btn-primary mt4" onclick="showSection('saisie')">Faire ma première saisie</button></div>`;
    return;
  }
  const last=weeks[weeks.length-1], prev=weeks[weeks.length-2];
  let kpis='', leadsTotal=0;
  PKEYS.forEach(p=>{
    const cfg=PLATFORMS[p], e=entry(last,p); if(!e) return;
    const cur=e[cfg.followKey], pe=prev?entry(prev,p):null;
    const d = (pe && pe[cfg.followKey]!=null && cur!=null) ? cur-pe[cfg.followKey] : null;
    leadsTotal += (+e.leads||0);
    const dCls = d>0?'up':(d<0?'down':'flat'), dTxt = d==null?'':(d>0?'▲ +'+fmt(d):(d<0?'▼ '+fmt(d):'—'));
    kpis+=`<div class="kpi fadeUp"><div class="label">${cfg.ic} ${cfg.name}</div>
      <div class="value">${fmt(cur)}</div><div class="delta ${dCls}">${dTxt} cette semaine</div></div>`;
  });
  // meilleure semaine (leads)
  let best={w:'—',v:0}; weeks.forEach(w=>{ let s=0; PKEYS.forEach(p=>{const e=entry(w,p); if(e)s+=(+e.leads||0);}); if(s>=best.v) best={w,v:s}; });

  el.innerHTML=`<h1 class="page-title">Vue globale</h1><p class="page-sub">Semaine ${last} · 4 réseaux suivis.</p>
    <div class="kpi-grid mb4">
      <div class="kpi featured fadeUp"><div class="label">🎯 Leads cette semaine</div><div class="value">${fmt(leadsTotal)}</div><div class="delta flat">objectif n°1</div></div>
      <div class="kpi fadeUp d1"><div class="label">🏆 Meilleure semaine (leads)</div><div class="value">${best.v}</div><div class="delta flat">${best.w}</div></div>
    </div>
    <div class="kpi-grid mb4">${kpis}</div>
    <div class="card fadeUp d2"><h3 class="mb4">Évolution des followers — 8 dernières semaines</h3><canvas id="ch-dash" height="120"></canvas></div>`;
  drawFollowersChart('ch-dash', weeks.slice(-8));
}

function switchSaisie(p){ saisiePlatform=p; document.querySelectorAll('#saisie-tabs .tab').forEach((t,i)=>t.classList.toggle('active',PKEYS[i]===p)); renderSaisieFields(); }
function renderSaisieFields(){
  const cfg=PLATFORMS[saisiePlatform], box=document.getElementById('saisie-fields'); let h='';
  for(const [grp,fields] of Object.entries(cfg.groups)){
    h+=`<div class="fieldset"><div class="legend">${grp}</div><div class="field-grid">`;
    fields.forEach(([m,lab,t])=>{ const suf=t==='p'?' (%)':t==='eur'?' (€)':''; h+=`<div><label>${lab}${suf}</label><input id="${inputId(saisiePlatform,m)}" inputmode="decimal" placeholder="—"></div>`; });
    h+=`</div></div>`;
  }
  box.innerHTML=h; loadSaisieValues();

function loadSaisieValues(){
  const week=val('saisie-week'), e=entry(week,saisiePlatform)||{};
  const pend=pendingShots[saisiePlatform]||{};
  allMetrics(saisiePlatform).forEach(([m])=>{ const inp=document.getElementById(inputId(saisiePlatform,m)); if(!inp)return;
    const v = pend[m]!=null ? pend[m] : (e[m]!=null? e[m] : '');
    inp.value = v;
    if(pend[m]!=null){ inp.classList.add('field-filled'); setTimeout(()=>inp.classList.remove('field-filled'),3000); }
  });
}
function saveSaisie(){
  const week=val('saisie-week'); if(!/^\d{4}-W\d{2}$/.test(week)) return toast("Format semaine attendu : 2026-W03");
  // 1) plateforme active : lire les inputs visibles
  const data={}; allMetrics(saisiePlatform).forEach(([m])=>{ const v=num(val(inputId(saisiePlatform,m))); if(v!=null) data[m]=v; });
  let saved=[];
  const commit=(p,d)=>{ if(!Object.keys(d).length)return; const wp=`${week}_${p}`; state.entries[wp]={...(state.entries[wp]||{}),...d}; pushEntry(wp,state.entries[wp]); saved.push(PLATFORMS[p].name); };
  commit(saisiePlatform,data);
  // 2) autres plateformes importées par screenshot mais pas encore affichées
  Object.keys(pendingShots).forEach(p=>{ if(p===saisiePlatform)return; commit(p,pendingShots[p]); });
  if(!saved.length) return toast("Aucune valeur saisie.");
  pendingShots={}; lsSet(LS.entries,state.entries);
  toast(`✅ ${saved.join(' · ')} · ${week} enregistré`);
  renderDashboard(); renderHistorique();
}

/* ---------- 8.3 HISTORIQUE ---------- */
let histFilter='all';
function renderHistorique(){
  const el=document.getElementById('sec-historique');
  const keys=Object.keys(state.entries).sort().reverse()
    .filter(k=> histFilter==='all' || k.endsWith('_'+histFilter));
  const chips=['all',...PKEYS].map(p=>`<button class="chip ${histFilter===p?'active':''}" onclick="histFilter='${p}';renderHistorique()">${p==='all'?'Tous':PLATFORMS[p].ic+' '+PLATFORMS[p].name}</button>`).join('');
  let rows='';
  keys.forEach(k=>{
    const [week,p]=k.split('_'); const cfg=PLATFORMS[p], e=state.entries[k];
    const pw=platformWeeks(p), idx=pw.indexOf(week), prev= idx>0? entry(pw[idx-1],p):null;
    const cur=e[cfg.followKey], d=(prev&&prev[cfg.followKey]!=null&&cur!=null)?cur-prev[cfg.followKey]:null;
    const dCls=d>0?'up':(d<0?'down':'flat');
    rows+=`<tr><td class="mono">${week}</td><td>${cfg.ic} ${cfg.name}</td>
      <td class="mono">${fmt(cur)}</td><td class="mono ${dCls}">${d==null?'—':(d>0?'+':'')+fmt(d)}</td>
      <td class="mono">${fmt(e[cfg.engKey])}${e[cfg.engKey]!=null?'%':''}</td>
      <td class="mono">${fmt(e.leads)}</td><td class="mono">${fmt(e.posts)}</td>
      <td class="mono">${fmt(e[cfg.reachKey])}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="removeEntry('${k}')">🗑</button></td></tr>`;
  });
  el.innerHTML=`<h1 class="page-title">Historique</h1><p class="page-sub">Toutes tes saisies, exportables.</p>
    <div class="row between mb4"><div class="row">${chips}</div>
      <div class="row"><button class="btn btn-secondary btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
      <label class="btn btn-secondary btn-sm" style="width:auto">⬆ Import CSV<input type="file" accept=".csv" hidden onchange="importCSV(event)"></label></div></div>
    ${keys.length? `<div class="table-wrap"><table><thead><tr>
      <th>Semaine</th><th>Plateforme</th><th>Followers</th><th>Δ</th><th>Engagement</th><th>Leads</th><th>Posts</th><th>Reach/Vues</th><th></th>
      </tr></thead><tbody>${rows}</tbody></table></div>`
    : `<div class="empty"><div class="ico">📋</div><p>Pas encore de saisie.</p></div>`}`;
}
async function removeEntry(k){ if(!confirm('Supprimer cette ligne ?'))return; await deleteEntry(k); renderHistorique(); renderDashboard(); }

function exportCSV(){
  const cols=['week','platform']; const set=new Set();
  Object.values(state.entries).forEach(e=>Object.keys(e).forEach(m=>set.add(m)));
  const metrics=[...set]; const header=[...cols,...metrics];
  let csv=header.join(',')+'\n';
  Object.keys(state.entries).sort().forEach(k=>{ const [w,p]=k.split('_'); const e=state.entries[k];
    csv+= [w,p,...metrics.map(m=> e[m]??'')].join(',')+'\n'; });
  dl(csv, `sxb_rs_data_${currentWeek()}.csv`);
}
function dl(content,name){ const b=new Blob([content],{type:'text/csv'}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function importCSV(ev){
  const f=ev.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{
    const lines=r.result.split(/\r?\n/).filter(Boolean); const head=lines[0].split(',');
    const iW=head.indexOf('week'), iP=head.indexOf('platform'); let added=0,dup=0;
    lines.slice(1).forEach(line=>{ const c=line.split(','); const w=c[iW], p=c[iP]; if(!w||!PLATFORMS[p])return;
      const wp=`${w}_${p}`; if(state.entries[wp]){dup++;return;} const data={};
      head.forEach((h,i)=>{ if(h==='week'||h==='platform')return; const v=num(c[i]); if(v!=null)data[h]=v; });
      state.entries[wp]=data; pushEntry(wp,data); added++; });
    lsSet(LS.entries,state.entries); toast(`✅ ${added} importées · ${dup} doublons ignorés`); renderHistorique(); renderDashboard();
  }catch(e){ toast("❌ CSV invalide"); } };
  r.readAsText(f); ev.target.value='';
}

function buildFullCtx(){
  let ctx=`\n\n[CONTEXTE NICHE] ${NICHE}`;
  const last=allWeeks().slice(-3);
  if(last.length){ ctx+=`\n[MES DONNÉES RÉCENTES]`; last.forEach(w=>{ PKEYS.forEach(p=>{ const e=entry(w,p); if(e) ctx+=`\n${w} ${PLATFORMS[p].name}: `+Object.entries(e).map(([k,v])=>`${k}=${v}`).join(', '); }); }); }
  if(state.comps.length){ ctx+=`\n[CRÉATEURS SUIVIS]`; state.comps.forEach(c=> ctx+=`\n${c.name} (${c.platform}): ${fmt(c.followers)} followers, ${c.engagement??'?'}% eng.`); }
  return ctx;
}
async function callClaude(userPrompt, imgs){
  if(!CLAUDE_API_KEY || CLAUDE_API_KEY.startsWith("COLLE")) throw new Error("Clé Claude manquante (CLAUDE_API_KEY).");
  const content = imgs && imgs.length
    ? [...imgs.map(d=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:d}})), {type:'text',text:userPrompt}]
    : userPrompt;
  const res=await fetch('https://api.anthropic.com/v1/messages',{ method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':CLAUDE_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({ model:CLAUDE_MODEL, max_tokens:imgs?1500:900, system:AI_SYSTEM, messages:[{role:'user',content}] }) });
  if(!res.ok){ const t=await res.text(); throw new Error('API '+res.status+' : '+t.slice(0,160)); }
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
}
async function runAI(boxId, prompt){
  const box=document.getElementById(boxId); if(!box)return; box.innerHTML='<span class="spinner"></span> Analyse en cours…';
  try{ box.textContent = await callClaude(prompt+buildFullCtx()); }
  catch(e){ box.textContent='❌ '+e.message; }
}

/* =================================================================
   11. IMPORT SCREENSHOTS (IA Vision)
   ================================================================= */
async function handleScreenshots(ev){
  const files=[...ev.target.files].slice(0,10); if(!files.length)return;
  const status=document.getElementById('shot-status'), thumbs=document.getElementById('shot-thumbs');
  thumbs.innerHTML=''; const b64=[];
  for(const f of files){ const d=await toB64(f); b64.push(d); const img=document.createElement('img'); img.src='data:image/jpeg;base64,'+d; thumbs.appendChild(img); }
  status.innerHTML='<span class="spinner"></span> Lecture des '+b64.length+' captures…';
  const fields=PKEYS.map(p=>`"${p}": {${allMetrics(p).map(([m])=>`"${m}": null`).join(', ')}}`).join(',\n');
  const prompt=`Analyse ces captures de statistiques social media. Identifie la plateforme de chaque image (Instagram = dégradé violet ; TikTok = noir ; LinkedIn = bleu ; YouTube = rouge). Extrais toutes les métriques visibles.
Règles : K = ×1000, M = ×1000000 ; pourcentages = nombre seul ; null si absent.
Correspondances de labels : IG "Vues" → impressions ; "Comptes touchés" → reach ; "Total des followers" → followers ; "Visites du profil" → profileVisits ; "Appuis sur des liens externes" → linkTaps ; "Interactions" → interactions ; "Comptes ayant interagi" → accountsInteracted. TikTok "Total des followers" → followers ; "Followers nets" → netFollowers ; "Vues de la vidéo" → views ; "Vues du profil" → profileViews ; "Total des spectateurs" → totalViewers ; "Nouveaux spectateurs" → newViewers ; sources Pour toi/Recherche/Profil personnel/Suivi(e)s en %.
Réponds UNIQUEMENT avec ce JSON (aucun texte, aucun markdown), en remplissant ce qui est détecté :
{
${fields},
"detected_platforms": []
}`;
  try{
    let raw=await callClaude(prompt,b64);
    raw=raw.replace(/```json|```/g,'').trim();
    const json=JSON.parse(raw);
    let summary=[];
    pendingShots={}; // repart d'un tampon propre à chaque import
    PKEYS.forEach(p=>{ if(!json[p])return; let n=0;
      allMetrics(p).forEach(([m])=>{ const v=json[p][m]; if(v!=null){
        pendingShots[p]=pendingShots[p]||{}; pendingShots[p][m]=v;       // mémorise pour toutes les plateformes
        const inp=document.getElementById(inputId(p,m));                 // remplit l'onglet actuellement affiché
        if(inp){ inp.value=v; inp.classList.add('field-filled'); setTimeout(()=>inp.classList.remove('field-filled'),3000); }
        n++; } });
      if(n) summary.push(`✅ ${PLATFORMS[p].name} — ${n} champs`);
    });
    status.innerHTML = summary.length? summary.join(' · ')+'<br><span class="muted">Valeurs mémorisées sur chaque onglet — clique « Enregistrer la semaine » (sauvegarde toutes les plateformes détectées d\'un coup).</span>' : '⚠️ Aucun champ détecté. Vérifie la console pour le JSON brut.';
    if(!summary.length) console.log('JSON brut Claude :', raw);
  }catch(e){ status.textContent='❌ '+e.message; console.error(e); }
  ev.target.value='';
}
function toB64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(new Error('Lecture image échouée')); r.readAsDataURL(file); }); }
